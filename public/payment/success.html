<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Оплата прошла успешно — Olga Yoga</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/shared/styles/common.css">
    <style>
        /* Стиль как у страницы авторизации */
        .payment-success-page {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #5CD6DA 0%, #148083 100%);
            padding: 2rem;
        }
        .payment-success-container {
            background: white;
            padding: 3rem;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 450px;
        }
        .payment-success-container h1 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 0.5rem;
            font-size: 2rem;
        }
        .payment-success-icon {
            text-align: center;
            font-size: 3rem;
            color: #148083;
            margin-bottom: 0.5rem;
        }
        .payment-success-subtitle {
            text-align: center;
            color: #7f8c8d;
            margin-bottom: 1.5rem;
            font-size: 0.95rem;
        }
        .payment-success-message {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 1rem;
            font-size: 1rem;
        }
        .payment-success-auth-note {
            background: #e8f7f8;
            border-left: 4px solid #148083;
            padding: 0.75rem 1rem;
            margin-bottom: 1.5rem;
            font-size: 0.9rem;
            color: #2c3e50;
        }
        .registration-form label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            color: #2c3e50;
        }
        .registration-form input {
            width: 100%;
            padding: 0.75rem;
            margin-bottom: 1rem;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 1rem;
            box-sizing: border-box;
        }
        .registration-form button {
            width: 100%;
            padding: 0.75rem 1.5rem;
            background: #148083;
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            font-size: 1rem;
        }
        .registration-form button:hover {
            background: #0f6a6d;
        }
        .registration-form button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .status-loading {
            color: #7f8c8d;
            margin-bottom: 1rem;
            font-size: 0.9rem;
        }
        .error-msg {
            color: #c00;
            margin-top: 0.5rem;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <main class="payment-success-page">
        <div class="payment-success-container">
            <div class="payment-success-icon">✓</div>
            <h1>Оплата прошла успешно</h1>
            <p class="payment-success-message" id="successMessage">Спасибо за оплату!</p>
            <p class="payment-success-auth-note">Обязательно авторизуйтесь, чтобы получить обратную связь от преподавателя.</p>
            <div id="loadingStatus" class="status-loading" style="display: none;"></div>
            <div id="registrationBlock" style="display: none;">
                <p class="payment-success-subtitle">Введите email и пароль для входа в личный кабинет:</p>
                <p style="font-size: 0.85rem; color: #7f8c8d; margin-bottom: 1rem;">Используйте новый пароль, который вы нигде больше не использовали — так браузер не будет предупреждать об утечке.</p>
                <form class="registration-form" id="registrationForm" autocomplete="off">
                    <label for="regEmail">Email</label>
                    <input type="email" id="regEmail" name="email" required placeholder="your@email.com" autocomplete="off">
                    <label for="regPassword">Пароль (минимум 6 символов)</label>
                    <input type="password" id="regPassword" name="password" required minlength="6" placeholder="••••••••" autocomplete="new-password">
                    <label for="regPasswordConfirm">Подтвердите пароль</label>
                    <input type="password" id="regPasswordConfirm" name="password_confirm" required minlength="6" placeholder="••••••••" autocomplete="new-password">
                    <div class="error-msg" id="formError"></div>
                    <button type="submit" id="submitBtn">Войти в личный кабинет</button>
                </form>
            </div>
        </div>
    </main>

    <script src="/shared/scripts/api.js"></script>
    <script>
        (function() {
            function getCookie(name) {
                const v = document.cookie.match('(^|;) ?' + name + '=([^;]*)(;|$)');
                return v ? v[2] : null;
            }
            function clearCookie(name) {
                document.cookie = name + '=; path=/; max-age=0';
            }
            function getPaymentId() {
                const fromUrl = new URLSearchParams(location.search).get('payment_id') || new URLSearchParams(location.search).get('orderId');
                const fromCookie = getCookie('payment_pending');
                let fromStorage = null;
                try { fromStorage = sessionStorage.getItem('payment_pending'); } catch (e) {}
                return fromUrl || fromCookie || fromStorage;
            }

            const paymentId = getPaymentId();
            const loadingEl = document.getElementById('loadingStatus');
            const regBlock = document.getElementById('registrationBlock');
            const successMsg = document.getElementById('successMessage');
            const form = document.getElementById('registrationForm');
            const formError = document.getElementById('formError');
            const submitBtn = document.getElementById('submitBtn');

            if (!paymentId) {
                successMsg.textContent = 'Спасибо за оплату! Если вы только что оплатили, обновите страницу через 10 секунд — форма регистрации появится. Либо свяжитесь с нами: 8 902 579-62-52.';
                loadingEl.style.display = 'block';
                loadingEl.textContent = 'Сохранённый платёж не найден. Обновите страницу.';
                return;
            }

            // Показываем форму сразу — пользователь может заполнять пока обрабатывается платёж
            loadingEl.style.display = 'block';
            loadingEl.textContent = 'Обрабатываем платёж…';
            regBlock.style.display = 'block';
            successMsg.textContent = 'Спасибо за оплату! Заполните данные для доступа в личный кабинет и чат с преподавателем.';

            let pollCount = 0;
            const maxPoll = 60;
            const pollInterval = setInterval(function() {
                pollCount++;
                api.get('/payment/check-pending?payment_id=' + encodeURIComponent(paymentId))
                    .then(function(data) {
                        if (data.ready) {
                            clearInterval(pollInterval);
                            loadingEl.textContent = '';
                            loadingEl.style.display = 'none';
                        }
                    })
                    .catch(function() {});
                if (pollCount >= maxPoll) {
                    clearInterval(pollInterval);
                    loadingEl.textContent = 'Платёж обрабатывается. Заполните форму и нажмите кнопку — если появится ошибка, попробуйте через минуту.';
                }
            }, 500);

            form.addEventListener('submit', async function(e) {
                e.preventDefault();
                formError.textContent = '';
                const password = document.getElementById('regPassword').value;
                const passwordConfirm = document.getElementById('regPasswordConfirm').value;
                if (password !== passwordConfirm) {
                    formError.textContent = 'Пароли не совпадают';
                    return;
                }
                submitBtn.disabled = true;
                const email = document.getElementById('regEmail').value.trim();
                try {
                    const data = await api.post('/payment/complete-registration', {
                        payment_id: paymentId,
                        email,
                        password
                    });
                    if (data.token) {
                        localStorage.setItem('auth_token', data.token);
                        clearCookie('payment_pending');
                        try { sessionStorage.removeItem('payment_pending'); } catch (e) {}
                        window.location.href = (data.redirect || '/admin/chat');
                    }
                } catch (err) {
                    formError.textContent = err.message || 'Ошибка. Попробуйте снова через минуту.';
                    submitBtn.disabled = false;
                }
            });
        })();
    </script>
</body>
</html>
