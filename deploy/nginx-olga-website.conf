# Конфиг Nginx для Olga Website
# При деплое: sudo cp ~/olga-website/deploy/nginx-olga-website.conf /etc/nginx/sites-available/olga-website
# Затем: sudo nginx -t && sudo systemctl reload nginx
#
# Если пользователь не anastkomarova — замените /home/anastkomarova на свой путь

server {
    listen 80;
    server_name _;

    # Максимальный размер загружаемых файлов (20GB для видео)
    client_max_body_size 20G;

    access_log /var/log/nginx/olga-website-access.log;
    error_log /var/log/nginx/olga-website-error.log;

    location / {
        root /home/anastkomarova/olga-website/public;
        try_files $uri $uri/ /index.html;
        index index.html;
    }

    location /admin {
        alias /home/anastkomarova/olga-website/admin;
        try_files $uri $uri/ /admin/index.html;
    }

    location /shared {
        alias /home/anastkomarova/olga-website/shared;
    }

    location /img {
        alias /home/anastkomarova/olga-website/img;
    }

    location /video {
        alias /home/anastkomarova/olga-website/video;
    }

    location /api {
        proxy_pass http://localhost:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;
    }

    location /media {
        proxy_pass http://localhost:9000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
